# Run as non-root user
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Use /tmp for nginx temporary files (writable by non-root)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    access_log /tmp/access.log;
    error_log /tmp/error.log;

    server {
        listen 8080;
        server_name _;

        root /home/nonroot/www;
        index index.html;

        location / {
            # Safely check if this is a WebSocket request (the game client)
            error_page 418 = @websocket;
            if ($http_upgrade = "websocket") {
                return 418;
            }

            try_files $uri $uri/ =404;
        }

        location @websocket {
            # Proxy WebSocket game connections to the dedicated server
            proxy_pass http://127.0.0.1:27960;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Disable directory
        autoindex off;
    }
}
