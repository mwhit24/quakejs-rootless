name: Build and Package

on:
  push:
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'nginx.conf'
      - 'server.cfg'
      - 'include/**'
      - 'quakejs/**'
      - '.helm/**'
      - '.github/workflows/docker.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-docker-image.outputs.digest }}
      repository: ${{ steps.export-vars.outputs.repository }}
      tag: ${{ steps.export-vars.outputs.tag }}
    env:
      REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
      DHI_TOKEN: ${{ secrets.DHI_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive registry host
        run: |
          set -euo pipefail
          host="${GITHUB_SERVER_URL#https://}"
          host="${host#http://}"
          if [ "$host" = "github.com" ]; then
            echo "REGISTRY_HOST=ghcr.io" >> "$GITHUB_ENV"
          else
            echo "REGISTRY_HOST=$host" >> "$GITHUB_ENV"
          fi
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPOSITORY_LOWER=$repo_lower" >> "$GITHUB_ENV"

      - name: Docker metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}
          tags: |
            type=ref,event=branch
            type=raw,value={{date 'YYYY.MM.DD.HHmm' tz='UTC'}}
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch }}
            type=raw,value=dev,enable=${{ github.ref_name != github.event.repository.default_branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Login to OCI registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ env.REGISTRY_ACCESS_TOKEN }}

      - name: Login to Docker Hardened Images registry
        uses: docker/login-action@v3
        if: ${{ env.DHI_USERNAME != '' && env.DHI_TOKEN != '' }}
        with:
          registry: dhi.io
          username: ${{ env.DHI_USERNAME }}
          password: ${{ env.DHI_TOKEN }}

      - name: Get git commit timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Export image outputs
        id: export-vars
        run: |
          set -euo pipefail
          if [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
            tag="latest"
          else
            tag="dev"
          fi
          echo "repository=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        id: build-docker-image
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}:buildcache,mode=max
          provenance: false
          sbom: false
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

  package-helm:
    runs-on: ubuntu-latest
    needs: [build-image]
    env:
      REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive registry host
        run: |
          set -euo pipefail
          host="${GITHUB_SERVER_URL#https://}"
          host="${host#http://}"
          if [ "$host" = "github.com" ]; then
            echo "REGISTRY_HOST=ghcr.io" >> "$GITHUB_ENV"
          else
            echo "REGISTRY_HOST=$host" >> "$GITHUB_ENV"
          fi
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPOSITORY_LOWER=$repo_lower" >> "$GITHUB_ENV"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to OCI registry for Helm
        run: |
          echo "${{ env.REGISTRY_ACCESS_TOKEN }}" | helm registry login "${{ env.REGISTRY_HOST }}" -u "${{ github.actor }}" --password-stdin

      - name: Package and push Helm chart
        run: |
          set -euo pipefail
          chart_name=$(awk -F': ' '/^name:/ {print $2; exit}' .helm/Chart.yaml)

          if [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
            chart_repo="oci://${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}"
          else
            chart_repo="oci://${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}/helm/dev"
          fi
          chart_ref="${chart_repo}/${chart_name}"

          chart_yaml_version=$(awk -F': ' '/^version:/ {print $2; exit}' .helm/Chart.yaml | tr -d ' ')
          tmp_chart_metadata=$(mktemp)
          if helm show chart "$chart_ref" > "$tmp_chart_metadata" 2>/dev/null; then
            published_version=$(awk -F': ' '/^version:/ {print $2; exit}' "$tmp_chart_metadata" | tr -d ' ')
          else
            published_version="0.0.0"
          fi
          rm -f "$tmp_chart_metadata"

          version_gt() {
            test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"
          }

          if version_gt "$chart_yaml_version" "$published_version"; then
            new_version="$chart_yaml_version"
          else
            IFS='.' read -r major minor patch <<< "$published_version"
            new_version="$major.$minor.$((patch+1))"
            sed -i -E "s/^version: .*/version: $new_version/" .helm/Chart.yaml
          fi

          image_repository="${{ needs.build-image.outputs.repository }}"
          image_tag="${{ needs.build-image.outputs.tag }}@${{ needs.build-image.outputs.digest }}"

          python3 - <<EOF
          import pathlib

          image_repository = "${image_repository}"
          image_tag = "${image_tag}"
          path = pathlib.Path(".helm/values.yaml")
          lines = path.read_text().splitlines()
          in_image = False
          for idx, line in enumerate(lines):
              stripped = line.lstrip()
              if line.startswith("image:"):
                  in_image = True
                  continue
              if in_image and stripped and not line.startswith((" ", "\t")):
                  in_image = False
              if in_image and stripped.startswith("repository:"):
                  indent = line[:len(line) - len(stripped)]
                  lines[idx] = f"{indent}repository: {image_repository}"
              if in_image and stripped.startswith("tag:"):
                  indent = line[:len(line) - len(stripped)]
                  lines[idx] = f'{indent}tag: "{image_tag}"'
          path.write_text("\\n".join(lines) + "\\n")
          EOF

          helm lint .helm
          helm package .helm
          helm push ".helm/${chart_name}-${new_version}.tgz" "$chart_repo"
