seta sv_hostname "Mike's Quake Server"
seta g_motd "Warmup running — match starts when the timer hits zero"
seta sv_maxclients 20
seta g_quadfactor 3
seta g_gametype 0
seta timelimit 10
seta fraglimit 20
seta g_weaponrespawn 3
seta g_inactivity 0
seta g_forcerespawn 0
seta g_allowVote 1

// ── Warmup ───────────────────────────────────────────────
// Players gather for 45s (no scoring), then the match auto-starts.
seta g_doWarmup 1
seta g_warmup 45

// ── Netcode tuning for a small cloud box ─────────────────
seta sv_fps 20
seta sv_maxRate 25000

// ── Manual host control (optional) ───────────────────────
// Uncomment + set a secret, then in-game: /rconpassword <secret>
// then e.g. /rcon map q3dm17 | /rcon restart | /rcon kick <name>
//seta rconpassword "change-me"

// ── Map rotation ─────────────────────────────────────────
set d1 "map q3dm7 ; set nextmap vstr d2"
set d2 "map q3dm17 ; set nextmap vstr d3"
set d3 "map q3dm1 ; set nextmap vstr d4"
set d4 "map pro-q3tourney2 ; set nextmap vstr d5"
set d5 "map pro-q3tourney4 ; set nextmap vstr d6"
set d6 "map pro-q3dm6 ; set nextmap vstr d7"
set d7 "map pro-q3dm13 ; set nextmap vstr d8"
set d8 "map q3tourney2 ; set nextmap vstr d1"
vstr d1
