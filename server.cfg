seta sv_hostname "Mike's Quake Server"
seta g_motd "Warmup running — match starts when the timer hits zero"
seta sv_maxclients 20
seta g_quadfactor 3
seta g_gametype 0
seta timelimit 10
seta fraglimit 20
seta g_weaponrespawn 3
seta g_inactivity 0
seta g_forcerespawn 0
seta g_allowVote 1
seta capturelimit 8

// ── Bots: auto-fill so the server is never empty/lopsided ─
// Keeps 4 players total; bots drop out as humans join, rejoin when they leave.
seta bot_enable 1
seta bot_minplayers 4
seta g_spSkill 3

// ── Warmup ───────────────────────────────────────────────
// Players gather for 45s (no scoring), then the match auto-starts.
seta g_doWarmup 1
seta g_warmup 45

// ── Netcode tuning for a small cloud box ─────────────────
seta sv_fps 20
seta sv_maxRate 25000

// ── Manual host control (optional) ───────────────────────
// Uncomment + set a secret, then in-game: /rconpassword <secret>
// then e.g. /rcon map q3dm17 | /rcon restart | /rcon kick <name>
seta rconpassword "rocket-jump-42"

// ── CPMA extras (active only when FS_GAME=cpma; ignored by baseq3) ─
// CPMA gates the match start on players readying up during warmup.
// In-game: type \ready (and \notready). A referee can force-start.
// Become referee in console:  \ref rocket-jump-42
// Then:  \allready  |  \restart  |  \lock  |  \callvote mode <ruleset>
seta refereePassword "rocket-jump-42"

// ── Map rotation (mixed FFA + CTF) ───────────────────────
// Each entry sets the gametype BEFORE the map, because g_gametype is
// latched and only applies on a full `map` load (not map_restart).
// gametype 0 = Free For All, 4 = Capture The Flag.
set d1 "g_gametype 0 ; map q3dm7  ; set nextmap vstr d2"   // FFA
set d2 "g_gametype 0 ; map q3dm17 ; set nextmap vstr d3"   // FFA
set d3 "g_gametype 0 ; map q3dm1  ; set nextmap vstr d4"   // FFA
set d4 "g_gametype 4 ; map q3wctf1 ; set nextmap vstr d5"  // CTF
set d5 "g_gametype 4 ; map q3wctf2 ; set nextmap vstr d6"  // CTF
set d6 "g_gametype 4 ; map q3wctf3 ; set nextmap vstr d1"  // CTF
vstr d1
